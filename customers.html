
<!DOCTYPE html>
<html>
<head>
    <title>Customers — FlowAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

    <!-- SIDEBAR -->
    <div class="w-64 bg-white h-screen shadow p-6">
        <h1 class="text-xl font-bold mb-8">FlowAI</h1>

        <a href="/dashboard" class="block mb-4 text-gray-700">Dashboard</a>
        <a href="/payments" class="block mb-4 text-gray-700">Payments</a>
        <a href="/customers" class="block mb-4 font-bold text-blue-600">Customers</a>
        <a href="/settings" class="block mb-4 text-gray-700">Settings</a>

        <a href="/logout" class="block mt-10 text-red-500">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="flex-1 p-8">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Customers</h2>

            <div class="flex gap-3">
                <input id="search"
                       placeholder="Search..."
                       class="border p-2 rounded">

                <select id="filter" class="border p-2 rounded">
                    <option value="all">All</option>
                    <option value="today">Today</option>
                    <option value="7">Last 7 days</option>
                    <option value="30">Last 30 days</option>
                </select>

                <button onclick="exportCSV()"
                        class="bg-green-600 text-white px-4 py-2 rounded">
                    Export CSV
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="bg-white rounded shadow overflow-hidden">

            {% if customers %}

            <table class="w-full text-left" id="customerTable">

                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-3">Phone</th>
                        <th class="p-3">Service</th>
                        <th class="p-3">Date</th>
                    </tr>
                </thead>

                <tbody id="tableBody">

                    {% for c in customers %}
                    <tr class="border-t" data-date="{{ c.date }}">
                        <td class="p-3">{{ c.phone }}</td>
                        <td class="p-3">{{ c.service if c.service else "—" }}</td>
                        <td class="p-3 text-gray-500">{{ c.date }}</td>
                    </tr>
                    {% endfor %}

                </tbody>

            </table>

            {% else %}
            <div class="p-6 text-gray-500">
                No customers yet
            </div>
            {% endif %}

        </div>

    </div>
</div>

<!-- SEARCH -->
<script>
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});
</script>

<!-- FILTER -->
<script>
document.getElementById("filter").addEventListener("change", function() {
    let value = this.value;
    let rows = document.querySelectorAll("#tableBody tr");
    let now = new Date();

    rows.forEach(row => {
        let dateText = row.getAttribute("data-date");
        let rowDate = new Date(dateText);

        let show = true;

        if (value === "today") {
            show = rowDate.toDateString() === now.toDateString();
        } 
        else if (value === "7") {
            let diff = (now - rowDate) / (1000 * 60 * 60 * 24);
            show = diff <= 7;
        } 
        else if (value === "30") {
            let diff = (now - rowDate) / (1000 * 60 * 60 * 24);
            show = diff <= 30;
        }

        row.style.display = show ? "" : "none";
    });
});
</script>

<!-- EXPORT CSV -->
<script>
function exportCSV() {
    let rows = document.querySelectorAll("#customerTable tr");
    let csv = [];

    rows.forEach(row => {
        let cols = row.querySelectorAll("td, th");
        let data = [];

        cols.forEach(col => data.push(col.innerText));
        csv.push(data.join(","));
    });

    let csvFile = new Blob([csv.join("\n")], { type: "text/csv" });
    let downloadLink = document.createElement("a");

    downloadLink.download = "customers.csv";
    downloadLink.href = window.URL.createObjectURL(csvFile);
    downloadLink.click();
}
</script>

</body>
</html>
