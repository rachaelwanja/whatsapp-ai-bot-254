        <div class="flex items-center gap-6">

            {% with avatar="🤖", online=True %}
                {% include "components/avatar.html" %}
            {% endwith %}

            <div>

                <h2 class="text-4xl font-bold text-slate-900">
                    Sophia
                </h2>

                <p class="mt-2 text-lg text-slate-500">

        <div class="flex gap-3">
