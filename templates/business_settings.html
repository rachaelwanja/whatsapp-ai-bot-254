<!DOCTYPE html>
<html>

<head>

    <title>Business Settings</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    {% include "sidebar.html" %}

    <div class="flex-1 p-8">

        <!-- Header -->

        <div class="flex justify-between items-center mb-8">

            <div>

                <h1 class="text-4xl font-bold">
                    ⚙️ Business Settings
                </h1>

                <p class="text-gray-500 mt-2">
                    Configure your business information for your AI receptionist.
                </p>

            </div>

            <a href="/dashboard"
               class="bg-black text-white px-5 py-3 rounded-xl">

                Dashboard

            </a>

        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}

        <div class="bg-green-100 text-green-700 p-4 rounded-xl mb-6">

            {{ messages[0] }}

        </div>

        {% endif %}
        {% endwith %}

        <div class="bg-white rounded-3xl shadow-lg p-8">

            <h2 class="text-2xl font-bold mb-6">

                Business Information

            </h2>

            <form method="POST"
                  class="grid md:grid-cols-2 gap-5">

                <input
                    type="text"
                    name="business_name"
                    placeholder="Business Name"
                    value="{{ business.business_name or '' }}"
                    class="border rounded-xl p-3">

                <select
                    name="business_type"
                    class="border rounded-xl p-3">

                    <option value="General"
                    {% if business.business_type=="General" %}selected{% endif %}>
                    General
                    </option>

                    <option value="Salon"
                    {% if business.business_type=="Salon" %}selected{% endif %}>
                    Salon
                    </option>

                    <option value="Restaurant"
                    {% if business.business_type=="Restaurant" %}selected{% endif %}>
                    Restaurant
                    </option>

                    <option value="Clinic"
                    {% if business.business_type=="Clinic" %}selected{% endif %}>
                    Clinic
                    </option>

                </select>

                <input
                    type="text"
                    name="business_phone"
                    placeholder="Phone Number"
                    value="{{ business.business_phone or '' }}"
                    class="border rounded-xl p-3">

                <input
                    type="text"
                    name="location"
                    placeholder="Location"
                    value="{{ business.location or '' }}"
                    class="border rounded-xl p-3">

                <input
                    type="text"
                    name="opening_hours"
                    placeholder="Mon–Fri 8am–6pm"
                    value="{{ business.opening_hours or '' }}"
                    class="border rounded-xl p-3 md:col-span-2">

                <textarea
                    name="ai_prompt"
                    rows="8"
                    placeholder="Describe how your AI receptionist should behave..."
                    class="border rounded-xl p-3 md:col-span-2">{{ business.ai_prompt or '' }}</textarea>

                <button
                    class="bg-black text-white rounded-xl p-3 md:col-span-2">

                    Save Settings

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
