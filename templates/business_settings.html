<!DOCTYPE html>
<html>
<head>
    <title>Business Settings</title>
</head>
<body>

<h1>Business Settings</h1>

<a href="/dashboard">← Dashboard</a>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <p style="color:green;">
            {{ messages[0] }}
        </p>
    {% endif %}
{% endwith %}

<form method="POST">

    <h2>Business Information</h2>

    <label>Business Name</label><br>
    <input
        type="text"
        name="business_name"
        value="{{ business.business_name or '' }}"
    >

    <br><br>

    <label>Business Type</label><br>

    <select name="business_type">

        <option value="General"
        {% if business.business_type=="General" %}selected{% endif %}>
        General
        </option>

        <option value="Salon"
        {% if business.business_type=="Salon" %}selected{% endif %}>
        Salon
        </option>

        <option value="Clinic"
        {% if business.business_type=="Clinic" %}selected{% endif %}>
        Clinic
        </option>

        <option value="Restaurant"
        {% if business.business_type=="Restaurant" %}selected{% endif %}>
        Restaurant
        </option>

    </select>

    <br><br>

    <label>Phone Number</label><br>

    <input
        type="text"
        name="business_phone"
        value="{{ business.business_phone or '' }}"
    >

    <br><br>

    <label>Location</label><br>

    <input
        type="text"
        name="location"
        value="{{ business.location or '' }}"
    >

    <br><br>

    <label>Opening Hours</label><br>

    <input
        type="text"
        name="opening_hours"
        placeholder="Mon-Fri 8am-6pm"
        value="{{ business.opening_hours or '' }}"
    >

    <br><br>

    <label>AI Prompt</label><br>

    <textarea
        name="ai_prompt"
        rows="6"
        cols="60"
    >{{ business.ai_prompt or '' }}</textarea>

    <br><br>

    <button type="submit">
        Save Settings
    </button>

</form>

</body>
</html>
