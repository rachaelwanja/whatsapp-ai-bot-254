<!DOCTYPE html>
<html>
<head>
<title>Pricing</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 grid grid-cols-3 gap-6">

<div class="bg-white p-6 text-center rounded shadow">
<h2>Basic</h2>
<p>KES 500</p>
<button onclick="buy('basic')" class="bg-gray-800 text-white p-2 w-full">Choose</button>
</div>

<div class="bg-white p-6 text-center rounded shadow border-2 border-blue-500">
<h2>Pro</h2>
<p>KES 1000</p>
<button onclick="buy('pro')" class="bg-blue-600 text-white p-2 w-full">Choose</button>
</div>

<div class="bg-white p-6 text-center rounded shadow">
<h2>Premium</h2>
<p>KES 2000</p>
<button onclick="buy('premium')" class="bg-purple-600 text-white p-2 w-full">Choose</button>
</div>

</div>

<script>
function buy(plan){
 fetch("/set_plan",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({plan:plan})
 })
 .then(()=>fetch("/pay",{method:"POST"}))
 .then(r=>r.json())
 .then(d=>alert(d.message))
}
</script>

</body>
</html>
