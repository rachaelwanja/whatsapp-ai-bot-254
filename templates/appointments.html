<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto mt-10">

    <h2 class="text-2xl font-bold mb-6">
        Appointments — {{ client.name }}
    </h2>

    <div class="bg-white rounded-xl shadow overflow-hidden">

        <table class="w-full">

            <thead class="bg-gray-200">
                <tr>
                    <th class="p-3 text-left">Patient</th>
                    <th class="p-3 text-left">Phone</th>
                    <th class="p-3 text-left">Date</th>
                    <th class="p-3 text-left">Booked At</th>
                </tr>
            </thead>

            <tbody>

                {% for a in appointments %}
                <tr class="border-t">
                    <td class="p-3">{{ a.name }}</td>
                    <td class="p-3">{{ a.phone }}</td>
                    <td class="p-3">{{ a.date }}</td>
                    <td class="p-3">{{ a.time }}</td>
                </tr>
                {% endfor %}

                {% if appointments|length == 0 %}
                <tr>
                    <td colspan="4" class="p-4 text-center text-gray-500">
                        No appointments yet
                    </td>
                </tr>
                {% endif %}

            </tbody>

        </table>

    </div>

    <a href="/dashboard"
       class="inline-block mt-6 bg-blue-600 text-white px-4 py-2 rounded">
       ← Back to Dashboard
    </a>

</div>

</body>
</html>
