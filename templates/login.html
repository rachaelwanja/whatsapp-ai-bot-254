<!DOCTYPE html>
<html>

<head>
    <title>FlowAI Login</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            width:300px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ddd;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            background:#25D366;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        h2{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Login</h2>

    <form method="POST" action="/login">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
