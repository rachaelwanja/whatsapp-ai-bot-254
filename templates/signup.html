<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

</head>

<body>

    <h1>Create Account</h1>

    <form method="POST">

        <input
            type="email"
            name="username"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <input
            type="text"
            name="business_name"
            placeholder="Business Name"
        >

        <br><br>

        <input
            type="text"
            name="business_phone"
            placeholder="Phone Number"
        >

        <br><br>

        <button type="submit">

            Create Account

        </button>

    </form>

</body>

</html>
