<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FlowAI Signup</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

        <div class="text-center mb-6">

            <h1 class="text-3xl font-bold text-green-600">
                FlowAI 🚀
            </h1>

            <p class="text-gray-500 mt-2">
                Create your business account
            </p>

        </div>

        <form method="POST" class="space-y-4">

            <!-- BUSINESS NAME -->
            <div>

                <label class="block mb-1 text-sm font-medium text-gray-700">
                    Business Name
                </label>

                <input
                    type="text"
                    name="business_name"
                    placeholder="e.g Nairobi Salon"
                    required

                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                >

            </div>

            <!-- EMAIL -->
            <div>

                <label class="block mb-1 text-sm font-medium text-gray-700">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="you@example.com"
                    required

                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                >

            </div>

            <!-- PHONE -->
            <div>

                <label class="block mb-1 text-sm font-medium text-gray-700">
                    Phone Number
                </label>

                <input
                    type="text"
                    name="phone"
                    placeholder="254712345678"
                    required

                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                >

            </div>

            <!-- PASSWORD -->
            <div>

                <label class="block mb-1 text-sm font-medium text-gray-700">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="********"
                    required

                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                >

            </div>

            <!-- BUTTON -->
            <button
                type="submit"

                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition"
            >
                Create Account
            </button>

        </form>

        <!-- LOGIN LINK -->
        <div class="text-center mt-6">

            <p class="text-gray-500">

                Already have an account?

                <a
                    href="/login"
                    class="text-green-600 font-semibold"
                >
                    Login
                </a>

            </p>

        </div>

    </div>

</body>
</html>
