<!DOCTYPE html>
<html>
<head>
    <title>Super Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-7xl mx-auto mt-10">

    <h1 class="text-3xl font-bold mb-6">
        🚀 Super Admin Dashboard
    </h1>

    <!-- STATS -->
    <div class="grid grid-cols-4 gap-4 mb-6">

        <div class="bg-white p-4 rounded shadow">
            <p>Total Clients</p>
            <h2 class="text-2xl font-bold">{{ total_clients }}</h2>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <p>Total Students</p>
            <h2 class="text-2xl font-bold">{{ total_students }}</h2>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <p>Appointments</p>
            <h2 class="text-2xl font-bold">{{ total_appointments }}</h2>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <p>Revenue (KES)</p>
            <h2 class="text-2xl font-bold">KES {{ revenue }}</h2>
        </div>

    </div>

    <!-- CLIENTS -->
    <div class="bg-white p-4 rounded shadow">

        <h2 class="font-bold mb-3">🏢 Clients</h2>

        {% for key, c in clients.items() %}
        <div class="border-b py-2 flex justify-between">
            <span>{{ c.name }}</span>
            <span class="text-gray-500">{{ c.type }}</span>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
