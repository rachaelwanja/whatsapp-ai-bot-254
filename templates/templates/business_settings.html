<!DOCTYPE html><html><head><title>Business Settings - FlowAI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head><body class="bg-gray-100"><div class="max-w-4xl mx-auto mt-10 bg-white rounded-2xl shadow-lg p-8"><h1 class="text-3xl font-bold mb-6">
    Business Settings
</h1>

<form method="POST">

    <div class="mb-5">

        <label class="font-semibold">
            Business Name
        </label>

        <input
            type="text"
            name="business_name"
            value="{{ business.business_name }}"
            class="w-full border rounded-lg p-3 mt-2">

    </div>

    <div class="mb-5">

        <label class="font-semibold">
            Business Type
        </label>

        <select
            name="business_type"
            class="w-full border rounded-lg p-3 mt-2">

            <option value="Salon" {% if business.business_type=="Salon" %}selected{% endif %}>Salon</option>

            <option value="Barbershop" {% if business.business_type=="Barbershop" %}selected{% endif %}>Barbershop</option>

            <option value="Clinic" {% if business.business_type=="Clinic" %}selected{% endif %}>Clinic</option>

            <option value="Law Firm" {% if business.business_type=="Law Firm" %}selected{% endif %}>Law Firm</option>

            <option value="Gym" {% if business.business_type=="Gym" %}selected{% endif %}>Gym</option>

            <option value="Real Estate" {% if business.business_type=="Real Estate" %}selected{% endif %}>Real Estate</option>

            <option value="Restaurant" {% if business.business_type=="Restaurant" %}selected{% endif %}>Restaurant</option>

            <option value="Other" {% if business.business_type=="Other" %}selected{% endif %}>Other</option>

        </select>

    </div>

    <div class="mb-5">

        <label class="font-semibold">
            Business Phone
        </label>

        <input
            type="text"
            name="business_phone"
            value="{{ business.business_phone }}"
            class="w-full border rounded-lg p-3 mt-2">

    </div>

    <div class="mb-5">

        <label class="font-semibold">
            Business Location
        </label>

        <input
            type="text"
            name="location"
            value="{{ business.location }}"
            placeholder="Kahawa West, Nairobi"
            class="w-full border rounded-lg p-3 mt-2">

    </div>

    <div class="mb-5">

        <label class="font-semibold">
            Opening Hours
        </label>

        <input
            type="text"
            name="opening_hours"
            value="{{ business.opening_hours }}"
            placeholder="Monday - Saturday, 8AM - 6PM"
            class="w-full border rounded-lg p-3 mt-2">

    </div>

    <div class="mb-6">

        <label class="font-semibold">
            AI Receptionist Instructions
        </label>

        <textarea
            name="ai_prompt"
            rows="8"
            class="w-full border rounded-lg p-3 mt-2">{{ business.ai_prompt }}</textarea>

        <p class="text-gray-500 text-sm mt-2">

Example:

"You are the receptionist for Rachel Beauty Salon.

Be friendly and professional.

Help customers book appointments, answer questions about services, prices, opening hours and location."

        </p>

    </div>

    <button
        class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg">

        Save Settings

    </button>

</form>

</div></body></html>
