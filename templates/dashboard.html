<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - FlowAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-50">

<div class="flex">

    <!-- SIDEBAR -->
    <div class="w-64 bg-white h-screen shadow p-6">
        <h1 class="text-xl font-bold mb-8">FlowAI</h1>

        <ul class="space-y-4">
            <li class="text-blue-600 font-semibold">Dashboard</li>
            <li>Payments</li>
            <li>Customers</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="flex-1 p-8">

        <!-- TOP BAR -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Dashboard</h2>

            <!-- FILTER -->
            <select id="filter" class="border px-3 py-2 rounded">
                <option value="7">Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="all">All time</option>
            </select>
        </div>

        <!-- CARDS -->
        <div class="grid grid-cols-3 gap-6 mb-6">

            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">Revenue</p>
                <h3 class="text-2xl font-bold">KES {{ revenue }}</h3>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">Bookings</p>
                <h3 class="text-2xl font-bold">{{ total_bookings }}</h3>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">Customers</p>
                <h3 class="text-2xl font-bold">{{ total_customers }}</h3>
            </div>

        </div>

        <!-- CHART -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <canvas id="revenueChart"></canvas>
        </div>

        <!-- SEARCH -->
        <input
            type="text"
            id="search"
            placeholder="Search payments..."
            class="border p-2 rounded w-full mb-4"
        />

        <!-- TABLE -->
        <div class="bg-white p-6 rounded-xl shadow">

            <table class="w-full text-left">
                <thead>
                    <tr class="border-b">
                        <th class="py-2">Phone</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    {% for p in payments %}
                    <tr class="border-b">
                        <td class="py-2">{{ p.phone }}</td>
                        <td>KES {{ p.amount }}</td>
                        <td>{{ p.date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>

    </div>
</div>

<!-- CHART SCRIPT -->
<script>
const labels = {{ chart_labels | tojson }};
const data = {{ chart_data | tojson }};

const ctx = document.getElementById('revenueChart').getContext('2d');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Revenue',
            data: data,
            tension: 0.4
        }]
    }
});
</script>

<!-- SEARCH SCRIPT -->
<script>
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});
</script>

</body>
</html>
