<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-50">

<div class="flex">

    <!-- SIDEBAR -->
    <div class="w-64 bg-white h-screen shadow p-6">

        <h1 class="text-xl font-bold mb-8">FlowAI</h1>

        <ul class="space-y-4">

            <li><a href="/dashboard" class="text-blue-600 font-semibold">Dashboard</a></li>
            <li><a href="/payments">Payments</a></li>
            <li><a href="/customers">Customers</a></li>
            <li><a href="/settings">Settings</a></li>

        </ul>

    </div>

    <!-- MAIN -->
    <div class="flex-1 p-8">

        <!-- TOP -->
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold">Dashboard</h2>

            <select class="border p-2 rounded">
                <option>Last 7 days</option>
                <option>Last 30 days</option>
            </select>
        </div>

        <!-- CARDS -->
        <div class="grid grid-cols-3 gap-6 mb-6">

            <div class="bg-white p-6 rounded-xl shadow">
                <p>Revenue</p>
                <h3 class="text-2xl font-bold">KES {{ revenue }}</h3>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <p>Bookings</p>
                <h3 class="text-2xl font-bold">{{ total_bookings }}</h3>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <p>Customers</p>
                <h3 class="text-2xl font-bold">{{ total_customers }}</h3>
            </div>

        </div>

        <!-- CHART -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <canvas id="chart"></canvas>
        </div>

        <!-- SEARCH -->
        <input id="search" placeholder="Search payments..."
               class="border p-2 rounded w-full mb-4">

        <!-- TABLE -->
        <div class="bg-white p-6 rounded-xl shadow">

            <table class="w-full">
                <thead>
                    <tr>
                        <th>Phone</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody id="table">
                    {% for p in payments %}
                    <tr>
                        <td>{{ p.phone }}</td>
                        <td>KES {{ p.amount }}</td>
                        <td>{{ p.date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>

    </div>
</div>

<!-- CHART -->
<script>
const labels = {{ chart_labels | tojson }};
const data = {{ chart_data | tojson }};

new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Revenue",
            data: data,
            tension: 0.4
        }]
    }
});
</script>

<!-- SEARCH -->
<script>
document.getElementById("search").addEventListener("keyup", function(){
    let v = this.value.toLowerCase();
    document.querySelectorAll("#table tr").forEach(r => {
        r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none";
    });
});
</script>

</body>
</html>
