<!DOCTYPE html>
<html>

<head>
<title>FlowAI Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    margin: 0;
}

.header {
    background: #1E3A8A;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.metric {
    font-size: 24px;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.status {
    padding: 5px 10px;
    border-radius: 5px;
    color: white;
}

.trial { background: orange; }
.paid { background: green; }
.expired { background: red; }
</style>

</head>

<body>

<div class="header">🚀 FlowAI Dashboard</div>

<div class="container">

<div class="card">
<h3>{{ client.name }}</h3>
<p>Plan:
<span class="status {{ client.plan }}">
{{ client.plan }}
</span>
</p>
<p>Expiry: {{ client.expiry }}</p>
</div>

<div class="card">
<h3>📊 Leads</h3>

<table id="leads-table">
<tr>
<th>Phone</th>
<th>Message</th>
<th>Time</th>
</tr>
</table>

</div>

</div>

<script>

async function loadLeads(){

let res = await fetch("/leads")
let data = await res.json()

let table = document.getElementById("leads-table")

data.forEach(l => {
    table.innerHTML += `
    <tr>
    <td>${l.phone}</td>
    <td>${l.message}</td>
    <td>${l.time}</td>
    </tr>
    `
})

}

loadLeads()

</script>

</body>
</html>
