<!DOCTYPE html>
<html>
<head>
    <title>Dashboard — FlowAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-8">

    <div class="bg-black text-white rounded-2xl p-6 mb-6">

        <h1 class="text-4xl font-bold">
            AI Flow Receptionist
        </h1>

        <p class="text-gray-300 mt-2">
            AI Receptionist Dashboard
        </p>

    </div>

    <div class="grid grid-cols-3 gap-6 mb-6">

        <div class="bg-white rounded-2xl p-6 shadow">

            <h3 class="text-gray-500">
                Revenue
            </h3>

            <p class="text-3xl font-bold">
                KES {{ revenue }}
            </p>

        </div>

        <div class="bg-white rounded-2xl p-6 shadow">

            <h3 class="text-gray-500">
                Appointments
            </h3>

            <p class="text-3xl font-bold">
                {{ appointments|length }}
            </p>

        </div>

        <div class="bg-white rounded-2xl p-6 shadow">

            <h3 class="text-gray-500">
                Services
            </h3>

            <p class="text-3xl font-bold">
                {{ services|length }}
            </p>

        </div>

    </div>

    <!-- SERVICES -->

    <div class="bg-white rounded-2xl p-6 shadow mb-6">

        <h2 class="text-2xl font-bold mb-4">
            Add Service
        </h2>

        <form action="/add-service" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Service Name"
                class="border p-2 rounded w-full mb-3"
            >

            <input
                type="number"
                name="price"
                placeholder="Price"
                class="border p-2 rounded w-full mb-3"
            >

            <input
                type="number"
                name="duration"
                placeholder="Duration"
                class="border p-2 rounded w-full mb-3"
            >

            <button class="bg-black text-white px-5 py-2 rounded">
                Save Service
            </button>

        </form>

    </div>

    <!-- APPOINTMENTS -->

    <div class="bg-white rounded-2xl p-6 shadow">

        <h2 class="text-2xl font-bold mb-4">
            Book Appointment
        </h2>

        <form action="/add-appointment" method="POST">

            <input
                type="text"
                name="customer_name"
                placeholder="Customer Name"
                class="border p-2 rounded w-full mb-3"
            >

            <input
                type="text"
                name="customer_phone"
                placeholder="Phone Number"
                class="border p-2 rounded w-full mb-3"
            >

            <input
                type="text"
                name="service"
                placeholder="Service"
                class="border p-2 rounded w-full mb-3"
            >

            <input
                type="number"
                name="amount"
                placeholder="Amount"
                class="border p-2 rounded w-full mb-3"
            >

            <input
                type="datetime-local"
                name="appointment_time"
                class="border p-2 rounded w-full mb-3"
            >

            <button class="bg-black text-white px-5 py-2 rounded">
                Book Appointment
            </button>

        </form>

    </div>

</div>

</body>
</html>
