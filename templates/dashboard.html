<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto mt-8">

<h2 class="text-2xl font-bold mb-6">
    Welcome, {{ client.name }}
</h2>

<!-- STATUS -->
<div class="bg-white p-5 rounded-xl shadow mb-6 flex justify-between">
    <div>
        <p>Status: {{ status }}</p>
        <p>Days left: {{ days_left }}</p>
    </div>

    {% if status == "EXPIRED ❌" %}
    <button onclick="pay()" class="bg-green-600 text-white px-4 py-2 rounded">
        Pay Now
    </button>
    {% endif %}
</div>

<!-- STATS -->
<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded shadow text-center">
<h3 class="text-gray-500">Leads</h3>
<p class="text-2xl font-bold">{{ analytics.leads }}</p>
</div>

<div class="bg-white p-4 rounded shadow text-center">
<h3 class="text-gray-500">Payments</h3>
<p class="text-2xl font-bold">{{ analytics.payments }}</p>
</div>

<div class="bg-white p-4 rounded shadow text-center">
<h3 class="text-gray-500">Conversion</h3>
<p class="text-2xl font-bold">{{ analytics.conversion }}%</p>
</div>

</div>

<!-- CHART -->
<div class="bg-white p-6 rounded shadow mb-6">
<canvas id="chart"></canvas>
</div>

<!-- ACTIONS -->
<div class="flex gap-4">
<a href="/pricing" class="bg-blue-600 text-white px-4 py-2 rounded">
Upgrade Plan
</a>
</div>

</div>

<script>
function pay(){
 fetch("/pay",{method:"POST"})
 .then(r=>r.json())
 .then(d=>alert(d.message))
}

// Chart
new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{
  labels:["Leads","Payments"],
  datasets:[{
   data:[
    {{ analytics.leads }},
    {{ analytics.payments }}
   ]
  }]
 }
})
</script>

</body>
</html>
