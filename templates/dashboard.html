<!DOCTYPE html>
<html>
<head>
    <title>FlowAI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-7xl mx-auto mt-10">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold">Dashboard</h1>
            <p class="text-gray-500">{{ client.name }}</p>
        </div>

        <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded">
            Logout
        </a>
    </div>

    <!-- SUBSCRIPTION -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">

        <h2 class="text-xl font-bold mb-2">💳 Subscription</h2>

        <p class="mb-2">
            Plan:
            <span class="font-semibold text-blue-600">
                {{ client.plan.upper() }}
            </span>
        </p>

        {% if days_left is not none %}
        <p class="mb-4">
            Days left:
            <span class="{% if days_left <= 3 %}text-red-600 font-bold{% endif %}">
                {{ days_left }} day(s)
            </span>
        </p>
        {% endif %}

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <!-- BASIC -->
            <form action="/pay" method="POST" class="border p-4 rounded">
                <h3 class="font-bold">Basic</h3>
                <p class="text-sm text-gray-500 mb-2">KES 500</p>

                <input type="hidden" name="plan" value="basic">
                <input name="phone" placeholder="2547XXXXXXXX"
                       class="w-full border p-2 rounded mb-2" required>

                <button class="bg-gray-800 text-white w-full py-2 rounded">
                    Pay
                </button>
            </form>

            <!-- PRO -->
            <form action="/pay" method="POST" class="border p-4 rounded">
                <h3 class="font-bold">Pro</h3>
                <p class="text-sm text-gray-500 mb-2">KES 1000</p>

                <input type="hidden" name="plan" value="pro">
                <input name="phone" placeholder="2547XXXXXXXX"
                       class="w-full border p-2 rounded mb-2" required>

                <button class="bg-blue-600 text-white w-full py-2 rounded">
                    Upgrade
                </button>
            </form>

            <!-- PREMIUM -->
            <form action="/pay" method="POST" class="border p-4 rounded">
                <h3 class="font-bold">Premium</h3>
                <p class="text-sm text-gray-500 mb-2">KES 2000</p>

                <input type="hidden" name="plan" value="premium">
                <input name="phone" placeholder="2547XXXXXXXX"
                       class="w-full border p-2 rounded mb-2" required>

                <button class="bg-green-600 text-white w-full py-2 rounded">
                    Upgrade
                </button>
            </form>

        </div>
    </div>

    <!-- INFO -->
    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-3">📊 System Overview</h2>
        <p class="text-gray-600">Your system is active and running.</p>
    </div>

</div>

</body>
</html>
