<div class="bg-white rounded-3xl border border-slate-200 shadow-sm">

    {% if title %}
    <div class="flex items-center justify-between px-8 py-6 border-b border-slate-200">

        <div>

            <h2 class="text-2xl font-bold text-slate-900">
                {{ title }}
            </h2>

            {% if subtitle %}
            <p class="mt-1 text-slate-500">
                {{ subtitle }}
            </p>
            {% endif %}

        </div>

        {% if action %}
            {{ action|safe }}
        {% endif %}

    </div>
    {% endif %}

    <div class="p-8">

        {{ content|safe }}

    </div>

</div>
