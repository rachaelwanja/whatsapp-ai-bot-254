<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto mt-10">

    <h2 class="text-2xl font-bold mb-6">
        Patients — {{ client.name }}
    </h2>

    <div class="bg-white rounded-xl shadow overflow-hidden">

        <table class="w-full">

            <thead class="bg-gray-200">
                <tr>
                    <th class="p-3">Name</th>
                    <th class="p-3">Phone</th>
                    <th class="p-3">Visits</th>
                    <th class="p-3">Last Visit</th>
                </tr>
            </thead>

            <tbody>

                {% for p in patients %}
                <tr class="border-t">
                    <td class="p-3">{{ p.name }}</td>
                    <td class="p-3">{{ p.phone }}</td>
                    <td class="p-3">{{ p.visits }}</td>
                    <td class="p-3">{{ p.last_visit }}</td>
                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

    <a href="/dashboard"
       class="inline-block mt-6 bg-blue-600 text-white px-4 py-2 rounded">
       ← Back
    </a>

</div>

</body>
</html>
