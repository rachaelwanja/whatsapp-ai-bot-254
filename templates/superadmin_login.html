<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<form method="POST" class="bg-white p-6 rounded shadow w-80">

    <h2 class="text-xl font-bold mb-4 text-center">Admin Login</h2>

    <input name="username" placeholder="Username"
           class="w-full p-2 border mb-3 rounded">

    <input name="password" type="password" placeholder="Password"
           class="w-full p-2 border mb-4 rounded">

    <button class="w-full bg-black text-white p-2 rounded">
        Login
    </button>

</form>

</body>
</html>
