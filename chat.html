<!DOCTYPE html>
<html>

<head>

<title>AI Chatbot</title>

<style>

body{
font-family:Arial;
}

#chat-button{

position:fixed;
bottom:20px;
right:20px;
background:#007bff;
color:white;
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:24px;
cursor:pointer;

}

#chat-box{

position:fixed;
bottom:90px;
right:20px;
width:300px;
height:400px;
background:white;
border:1px solid #ccc;
display:none;
flex-direction:column;

}

#messages{

flex:1;
overflow-y:auto;
padding:10px;

}

#input{

display:flex;
border-top:1px solid #ccc;

}

#input input{

flex:1;
border:none;
padding:10px;

}

#input button{

border:none;
background:#007bff;
color:white;
padding:10px;

}

</style>

</head>

<body>

<button id="chat-button" onclick="toggleChat()">💬</button>

<div id="chat-box">

<div id="messages"></div>

<div id="input">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function toggleChat(){

let box = document.getElementById("chat-box")

box.style.display = box.style.display === "none" ? "flex" : "none"

}

async function send(){

let message = document.getElementById("msg").value

let messages = document.getElementById("messages")

messages.innerHTML += "<p><b>You:</b> "+message+"</p>"

let res = await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({message:message})

})

let data = await res.json()

messages.innerHTML += "<p><b>Bot:</b> "+data.reply+"</p>"

document.getElementById("msg").value=""

messages.scrollTop = messages.scrollHeight

}

</script>

</body>

</html>
