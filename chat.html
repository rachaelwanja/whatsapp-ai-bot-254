<!DOCTYPE html>
<html>

<head>
<title>FlowAI Widget</title>

<style>
body {
    font-family: Arial;
}

/* Floating Button */
#chat-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 50%;
    width: 65px;
    height: 65px;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
}

/* Chat Box */
#chat-box {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 320px;
    height: 450px;
    background: #ece5dd;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
}

/* Header */
#header {
    background: #075e54;
    color: white;
    padding: 10px;
    font-weight: bold;
}

/* Messages */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

/* Chat bubbles */
.msg {
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    max-width: 80%;
}

.user {
    background: #dcf8c6;
    align-self: flex-end;
}

.bot {
    background: white;
    align-self: flex-start;
}

/* Input */
#input {
    display: flex;
    background: white;
}

#input input {
    flex: 1;
    border: none;
    padding: 10px;
}

#input button {
    border: none;
    background: #25D366;
    color: white;
    padding: 10px;
}

/* CTA */
.cta {
    background: #128C7E;
    color: white;
    text-align: center;
    padding: 8px;
    text-decoration: none;
}
</style>

</head>

<body>

<button id="chat-button" onclick="toggleChat()">💬</button>

<div id="chat-box">

<div id="header">💬 Chat with us</div>

<div id="messages">
<div class="msg bot">Hi 👋 How can we help you today?</div>
</div>

<div id="input">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

<a class="cta" href="/signup">🚀 Get This Chatbot</a>

</div>

<script>

function toggleChat(){
    let box = document.getElementById("chat-box")
    box.style.display = box.style.display === "none" ? "flex" : "none"
}

async function send(){

    let message = document.getElementById("msg").value
    let messages = document.getElementById("messages")

    messages.innerHTML += `<div class="msg user">${message}</div>`

    let res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({message:message})
    })

    let data = await res.json()

    messages.innerHTML += `<div class="msg bot">${data.reply}</div>`

    document.getElementById("msg").value=""
    messages.scrollTop = messages.scrollHeight
}

</script>

</body>
</html>

</body>

</html>
