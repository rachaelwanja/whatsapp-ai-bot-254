<!DOCTYPE html>
<html>
<body>

<div id="messages"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
let clientId = new URLSearchParams(window.location.search).get("client");

async function send(){

let msg = document.getElementById("msg").value

let res = await fetch("/chat_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:msg,
client:clientId
})
})

let data = await res.json()

document.getElementById("messages").innerHTML += "<p>"+data.reply+"</p>"
}
</script>

</body>
</html>
